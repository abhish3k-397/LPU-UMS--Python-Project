{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-10">
    <div class="col-md-10 col-lg-8 col-xl-7 px-lg-4">
        <!-- PREMIUM GLASSMORPHISM CONTAINER -->
        <div
            class="bg-white dark:!bg-slate-800 rounded-[3rem] shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:!border-slate-700/50 overflow-hidden transition-all duration-300">

            <!-- HEADER SECTION -->
            <div class="p-8 pb-0 flex flex-col items-center text-center">
                <div
                    class="w-20 h-20 bg-indigo-50 dark:!bg-indigo-500/10 rounded-[2rem] flex items-center justify-center mb-6 border border-indigo-100 dark:!border-indigo-500/20 shadow-inner group hover:scale-110 transition-transform duration-500">
                    <span class="text-4xl text-indigo-500">📅</span>
                </div>
                <h2 class="text-4xl font-black text-slate-800 dark:!text-white tracking-tight mb-2">Attendance Edit</h2>
                <p class="text-slate-500 dark:text-slate-400 font-medium max-w-md">
                    Submit correction requests for prior sessions. Admin approval is required for all status
                    modifications.
                </p>
                <div class="w-20 h-1.5 bg-gradient-to-r from-orange-500 to-red-600 rounded-full mt-4"></div>
            </div>

            <!-- FORM SECTION -->
            <div class="p-8 sm:p-12">
                <form method="post" action="{% url 'request_edit' %}" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    {% csrf_token %}

                    <!-- Section Selector (Spans 2) -->
                    <div class="md:col-span-2">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Select
                            Section</label>
                        <select id="sectionSelect"
                            class="w-full h-16 px-6 bg-slate-50 dark:!bg-slate-900 border border-slate-200 dark:!border-slate-700 rounded-3xl text-slate-700 dark:!text-slate-200 font-bold focus:!ring-2 focus:!ring-indigo-500/20 focus:!border-indigo-500 transition-all appearance-none cursor-pointer"
                            required>
                            <option value="">-- Choose a section --</option>
                            {% for section in sections %}
                            <option value="{{ section.id }}">{{ section.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Session Selector (Dependent Spans 2) -->
                    <div class="md:col-span-2">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Select
                            Prior Session</label>
                        <select name="session_id" id="sessionSelect"
                            class="w-full h-16 px-6 bg-slate-50 dark:!bg-slate-900 border border-slate-200 dark:!border-slate-700 rounded-3xl text-slate-700 dark:!text-slate-200 font-bold focus:!ring-2 focus:!ring-indigo-500/20 focus:!border-indigo-500 transition-all appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                            required disabled>
                            <option value="">-- Choose a section first --</option>
                        </select>
                    </div>

                    <!-- Student Identity Dropdown (Dependent) -->
                    <div class="md:col-span-1">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Student
                            Identity</label>
                        <select name="student_id" id="studentSelect"
                            class="w-full h-16 px-6 bg-slate-50 dark:!bg-slate-900 border border-slate-200 dark:!border-slate-700 rounded-3xl text-slate-700 dark:!text-slate-200 font-bold focus:!ring-2 focus:!ring-indigo-500/20 focus:!border-indigo-500 transition-all appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                            required disabled>
                            <option value="">-- Choose a section first --</option>
                        </select>
                    </div>

                    <!-- Requested Status -->
                    <div class="md:col-span-1">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Proposed
                            Status</label>
                        <select name="requested_status"
                            class="w-full h-16 px-6 bg-slate-50 dark:!bg-slate-900 border border-slate-200 dark:!border-slate-700 rounded-3xl text-slate-700 dark:!text-slate-200 font-bold focus:!ring-2 focus:!ring-indigo-500/20 focus:!border-indigo-500 transition-all appearance-none cursor-pointer"
                            required>
                            <option value="true">✅ Mark as PRESENT</option>
                            <option value="false">❌ Mark as ABSENT</option>
                        </select>
                    </div>

                    <!-- Reason for Change (Spans 2) -->
                    <div class="md:col-span-2">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Reasoning
                            & Evidence</label>
                        <textarea name="reason" rows="4"
                            class="w-full p-6 bg-slate-50 dark:!bg-slate-900 border border-slate-200 dark:!border-slate-700 rounded-[2rem] text-slate-700 dark:!text-slate-200 font-bold placeholder:text-slate-300 dark:placeholder:text-slate-600 focus:!ring-2 focus:!ring-indigo-500/20 focus:!border-indigo-500 transition-all resize-none"
                            placeholder="Provide details for the administrator's review..." required></textarea>
                    </div>

                    <!-- ACTIONS SECTION (Spans 2) -->
                    <div
                        class="md:col-span-2 flex flex-col sm:flex-row items-center gap-4 mt-4 pt-8 border-t border-slate-100 dark:!border-slate-700/50">
                        <button type="submit"
                            class="w-full sm:w-auto h-16 px-12 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-black rounded-3xl shadow-xl shadow-orange-500/30 transform hover:-translate-y-1 transition-all flex items-center justify-center gap-2 border-none">
                            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                            SUBMIT REQUEST
                        </button>
                        <a href="{% url 'dashboard' %}"
                            class="w-full sm:w-auto h-16 px-12 bg-slate-50 dark:!bg-slate-900/50 hover:bg-slate-100 dark:hover:bg-slate-900 border border-slate-100 dark:!border-slate-700 rounded-3xl text-slate-400 dark:text-slate-500 font-bold transition-all flex items-center justify-center no-underline">
                            CANCEL
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{{ data_map_json|json_script:"data-map" }}

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Django's json_script outputs valid JSON block, so we just parse it once
        const dataMapRaw = JSON.parse(document.getElementById('data-map').textContent);
        // Since we did json.dumps in views.py, it might be double-encoded as a string
        const dataMap = typeof dataMapRaw === 'string' ? JSON.parse(dataMapRaw) : dataMapRaw;

        const sectionSelect = document.getElementById('sectionSelect');
        const sessionSelect = document.getElementById('sessionSelect');
        const studentSelect = document.getElementById('studentSelect');

        sectionSelect.addEventListener('change', function () {
            const sectionId = this.value;

            // Reset dependent dropdowns
            sessionSelect.innerHTML = '<option value="">-- Choose a session --</option>';
            studentSelect.innerHTML = '<option value="">-- Select a student --</option>';

            // dataMap keys might be strings in JSON
            if (sectionId && dataMap[String(sectionId)]) {
                const sectionData = dataMap[String(sectionId)];

                // Populate sessions
                if (sectionData.sessions.length > 0) {
                    sectionData.sessions.forEach(sess => {
                        const option = document.createElement('option');
                        option.value = sess.id;
                        option.textContent = sess.display;
                        sessionSelect.appendChild(option);
                    });
                    sessionSelect.disabled = false;
                } else {
                    sessionSelect.innerHTML = '<option value="">-- No sessions found --</option>';
                    sessionSelect.disabled = true;
                }

                // Populate students
                if (sectionData.students.length > 0) {
                    sectionData.students.forEach(stu => {
                        const option = document.createElement('option');
                        option.value = stu.id;
                        option.textContent = stu.display;
                        studentSelect.appendChild(option);
                    });
                    studentSelect.disabled = false;
                } else {
                    studentSelect.innerHTML = '<option value="">-- No students found --</option>';
                    studentSelect.disabled = true;
                }
            } else {
                // Disabled state if no section is active
                sessionSelect.innerHTML = '<option value="">-- Choose a section first --</option>';
                studentSelect.innerHTML = '<option value="">-- Choose a section first --</option>';
                sessionSelect.disabled = true;
                studentSelect.disabled = true;
            }
        });
    });
</script>

<style>
    /* Custom Focus Animation */
    input:focus,
    select:focus,
    textarea:focus {
        transform: translateY(-2px);
    }
</style>
{% endblock %}
