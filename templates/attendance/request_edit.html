{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 dark:bg-gray-800 dark:border-gray-700">
            <div class="card-header bg-white dark:bg-gray-800 border-bottom dark:border-gray-700 py-4">
                <h4 class="mb-1 font-bold dark:text-white">Request Attendance Edit</h4>
                <p class="mb-0 text-sm text-gray-500 dark:text-gray-400">Submit a correction. Approval required by
                    Admin.</p>
            </div>

            <div class="card-body p-4">
                <form method="post" action="{% url 'request_edit' %}">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label font-semibold text-sm dark:text-gray-300">Select Session Date</label>
                        <select name="session_id" id="sessionSelect"
                            class="form-select dark:bg-gray-700 dark:text-white dark:border-gray-600" required>
                            <option value="">-- Choose a prior session --</option>
                            {% for session in sessions %}
                            <option value="{{ session.id }}">
                                {{ session.course.code }} ({{ session.course.name }}) - {{ session.date|date:"N j, Y" }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label font-semibold text-sm dark:text-gray-300">Student Username</label>
                        <input type="text" name="student_id" placeholder="Enter the student's username (e.g. Arjun)"
                            class="form-control dark:bg-gray-700 dark:text-white dark:border-gray-600" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label font-semibold text-sm dark:text-gray-300">Requested Status</label>
                        <select name="requested_status"
                            class="form-select dark:bg-gray-700 dark:text-white dark:border-gray-600" required>
                            <option value="true">Mark as PRESENT</option>
                            <option value="false">Mark as ABSENT</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label font-semibold text-sm dark:text-gray-300">Reason for Change</label>
                        <textarea name="reason" rows="3"
                            class="form-control dark:bg-gray-700 dark:text-white dark:border-gray-600"
                            placeholder="Provide a detailed reason for the admin to review..." required></textarea>
                    </div>

                    <div
                        class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top dark:border-gray-700">
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-warning font-bold shadow-sm">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
